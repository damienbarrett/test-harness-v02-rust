version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install dependencies
    cmds:
      - cargo fetch --locked

  build:
    desc: Build the WASM component
    sources:
      - src/**/*.rs
      - ../../common/wit/tasks.wit
    generates:
      - task-component.wasm
    cmds:
      - cargo component build --release --locked --offline
      - cp "${CARGO_TARGET_DIR:-target}/wasm32-wasip1/release/task_component.wasm" task-component.wasm

  test:
    desc: Run tests (builds first)
    deps: [build]
    cmds:
      - cargo test --locked --offline --tests

  coverage:
    desc: Run tests with coverage (100% threshold)
    cmds:
      - cargo clean
      - cargo component build --release --locked --offline
      - cp "${CARGO_TARGET_DIR:-target}/wasm32-wasip1/release/task_component.wasm" task-component.wasm
      - cargo llvm-cov clean --workspace
      - cargo llvm-cov --locked --offline --tests --fail-under-lines 100 --fail-under-functions 100 --fail-under-regions 100

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - cargo clean
      - rm -f task-component.wasm

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
